function badgeHTML(val,metric,fmt){
  if(val==null) return dash;
  return '<span class="badge '+badgeClass(val,metric)+'">'+fmt(val)+'</span>';
}
function viewLink(url){
  if(!url) return '<span class="no-link">&mdash;</span>';
  return '<a class="view-link" href="'+url+'" target="_blank" rel="noopener">View <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.5 1.5h7v7M10.5 1.5L1.5 10.5"/></svg></a>';
}

function getCols(tabId){
  const t=TABS.find(x=>x.id===tabId);
  const cols=[
    {key:'idx',label:'#',sticky:'stick-idx'},
    {key:'name',label:'Name',sticky:'stick-name',sortable:true}
  ];
  if(t.hasGender){ cols.push({key:'gender',label:'Gender',sortable:true}); }
  cols.push(
    {key:'link',label:'Ad'},
    {key:'cost',label:'Spend',sortable:true},
    {key:'leads',label:'Leads',sortable:true},
    {key:'cpl',label:'CPL',sortable:true},
    {key:'qa',label:'QA',sortable:true},
    {key:'cpqa',label:'CPQA',sortable:true},
    {key:'mql',label:'MQL',sortable:true},
    {key:'cpmql',label:'CPMQL',sortable:true},
    {key:'sql',label:'SQL',sortable:true},
    {key:'cpsql',label:'CPSQL',sortable:true},
    {key:'cust',label:'Cust',sortable:true},
    {key:'cac',label:'CAC',sortable:true}
  );
  if(t.isVideo){
    cols.push({key:'hookRate',label:'Hook %',sortable:true});
    cols.push({key:'holdRate',label:'Hold %',sortable:true});
  }
  cols.push({key:'ctrAll',label:'CTR (all)',sortable:true});
  cols.push({key:'ctrLink',label:'CTR (link)',sortable:true});
  cols.push({key:'cpm',label:'CPM',sortable:true});
  cols.push({key:'impr',label:'Impressions',sortable:true});
  return cols;
}

function renderTabs(){
  document.getElementById('tabBar').innerHTML = TABS.map(t=>
    '<button class="tab-btn'+(t.id===activeTab?' active':'')+'" onclick="switchTab(\''+t.id+'\')">'+t.label+' <span class="cnt">('+t.data.length+')</span></button>'
  ).join('');
}
function switchTab(id){ activeTab=id; sortCol='cpqa'; sortAsc=true; renderTabs(); updateLegend(); renderTable(); }
function updateLegend(){
  const t=TABS.find(x=>x.id===activeTab);
  let html='<div class="legend-item"><span class="legend-dot dot-green"></span> CPQA &le; $500</div>'+
    '<div class="legend-item"><span class="legend-dot dot-yellow"></span> CPQA $500&ndash;$600</div>'+
    '<div class="legend-item"><span class="legend-dot dot-red"></span> CPQA &gt; $600</div>'+
    '<div class="legend-item"><span class="legend-dot dot-gray"></span> No Data</div>';
  if(t&&t.isVideo){
    html+='<div class="legend-item"><span class="legend-dot dot-green"></span> Hook/Hold &ge; 20%</div>'+
      '<div class="legend-item"><span class="legend-dot dot-yellow"></span> Hook/Hold 15&ndash;20%</div>'+
      '<div class="legend-item"><span class="legend-dot dot-red"></span> Hook/Hold &lt; 15%</div>';
  }
  document.getElementById('legend').innerHTML=html;
}

function renderTable(){
  const t=TABS.find(x=>x.id===activeTab);
  if(!t) return;
  const cols=getCols(activeTab);
  let rows=[...t.data];
  if(searchQ){ const q=searchQ.toLowerCase(); rows=rows.filter(r=>r.name.toLowerCase().includes(q)); }
  if(filterWinners){ rows=rows.filter(r=>r.cpqa!=null&&r.cpqa>0&&r.cpqa<=500); }
  if(filterSpend){ rows=rows.filter(r=>r.cost!=null&&r.cost>=500); }
  rows.sort((a,b)=>{
    // Pin total rows above non-totals, but keep M above F within totals
    if(a.isTotal&&!b.isTotal) return -1;
    if(!a.isTotal&&b.isTotal) return 1;
    if(a.isTotal&&b.isTotal){
      if(a.gender==='M'&&b.gender==='F') return -1;
      if(a.gender==='F'&&b.gender==='M') return 1;
    }
    let va=a[sortCol], vb=b[sortCol];
    if(va==null&&vb==null)return 0;
    if(va==null)return 1;
    if(vb==null)return -1;
    if(typeof va==='string')return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });
  const totalRows=rows.length;
  let html='<table><thead><tr>';
  cols.forEach(c=>{
    const sk=c.sticky?' '+c.sticky:'';
    const sd=c.key===sortCol?' sorted':'';
    const ar=c.sortable?'<span class="arrow">'+(c.key===sortCol?(sortAsc?'\u25B2':'\u25BC'):'\u25B2')+'</span>':'';
    const oc=c.sortable?' onclick="doSort(\''+c.key+'\')"':'';
    html+='<th class="'+sk+sd+'"'+oc+'>'+c.label+ar+'</th>';
  });
  html+='</tr></thead><tbody>';
  rows.forEach((r,i)=>{
    const trCls=r.isTotal?' class="total-row"':'';
    html+='<tr'+trCls+'>';
    cols.forEach(c=>{
      const sk=c.sticky?' '+c.sticky:'';
      switch(c.key){
        case 'idx': html+='<td class="idx-col'+sk+'">'+(r.isTotal?'':(i+1))+'</td>'; break;
        case 'name': html+='<td class="name-col'+sk+'">'+r.name+'</td>'; break;
        case 'gender':
          if(r.isTotal){ html+='<td>'+(r.gender==='M'?'<span class="gender-m">M</span>':'<span class="gender-f">F</span>')+'</td>'; }
          else { html+='<td>'+(r.gender==='M'?'<span class="gender-m">M</span>':r.gender==='F'?'<span class="gender-f">F</span>':dash)+'</td>'; }
          break;
        case 'link': html+='<td>'+viewLink(r.link)+'</td>'; break;
        case 'cost': html+='<td class="num">'+(r.cost!=null?fmtD(r.cost):dash)+'</td>'; break;
        case 'leads': case 'qa': case 'mql': case 'sql': case 'cust':
          html+='<td class="num">'+(r[c.key]!=null?fmtN(r[c.key]):dash)+'</td>'; break;
        case 'cpl': case 'cpmql': case 'cpsql': case 'cac':
          html+='<td class="num">'+(r[c.key]!=null?fmtD0(r[c.key]):dash)+'</td>'; break;
        case 'cpqa': html+='<td class="num">'+badgeHTML(r.cpqa,'cpqa',fmtD0)+'</td>'; break;
        case 'hookRate': html+='<td class="num">'+badgeHTML(r.hookRate,'hookRate',fmtP1)+'</td>'; break;
        case 'holdRate': html+='<td class="num">'+badgeHTML(r.holdRate,'holdRate',fmtP1)+'</td>'; break;
        case 'ctrAll': html+='<td class="num">'+(r.ctrAll!=null?fmtP2(r.ctrAll):dash)+'</td>'; break;
        case 'ctrLink': html+='<td class="num">'+(r.ctrLink!=null?fmtP2(r.ctrLink):dash)+'</td>'; break;
        case 'cpm': html+='<td class="num">'+(r.cpm!=null?fmtD(r.cpm):dash)+'</td>'; break;
        case 'impr': html+='<td class="num">'+(r.impr!=null?fmtComma(r.impr):dash)+'</td>'; break;
        default: html+='<td class="num">'+dash+'</td>';
      }
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('panels').innerHTML='<div class="tab-panel active"><div class="table-wrap">'+html+'</div><div class="row-count">'+totalRows+' of '+t.data.length+' creatives</div></div>';
}
function doSort(col){ if(sortCol===col){sortAsc=!sortAsc;}else{sortCol=col;sortAsc=true;} renderTable(); }
function toggleFilter(type){
  if(type==='winners'){ filterWinners=!filterWinners; document.getElementById('btnWinners').classList.toggle('active',filterWinners); }
  else if(type==='spend'){ filterSpend=!filterSpend; document.getElementById('btnSpend').classList.toggle('active',filterSpend); }
  renderTable();
}
document.getElementById('search').addEventListener('input',e=>{ searchQ=e.target.value; renderTable(); });
renderTabs(); updateLegend(); renderTable();
</script>
</body>
</html>
